name: ShellCheck

on:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run ShellCheck
        run: find . -name '*.sh' -not -path '*/.*' -print0 | xargs -0 shellcheck
